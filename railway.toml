# Configuração padrão para o serviço API na Railway.
#
# Dois serviços no mesmo projeto, mesmo repositório:
#
# ┌─ Serviço API ─────────────────────────────────────────────┐
# │ Config file path: railway.toml (padrão)                  │
# │ Dockerfile: docker/api.Dockerfile                          │
# │ Variáveis: DATABASE_URL, JWT_SECRET, JWT_REFRESH_SECRET,   │
# │            CORS_ORIGINS (URL pública do web)               │
# └────────────────────────────────────────────────────────────┘
#
# ┌─ Serviço Web ──────────────────────────────────────────────┐
# │ Config file path: railway.web.toml  ← OBRIGATÓRIO         │
# │ Dockerfile: docker/web.Dockerfile                          │
# │ Build args / variáveis de build:                           │
# │   NEXT_PUBLIC_API_URL=https://<api>.up.railway.app         │
# │   NEXT_PUBLIC_WS_URL=wss://<api>.up.railway.app            │
# │ (sem /api no final — o app adiciona /api nas chamadas)     │
# └────────────────────────────────────────────────────────────┘

[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/api.Dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
